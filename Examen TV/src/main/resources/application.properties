spring.application.name=Examen TV

# MySQL Connection
spring.datasource.url=jdbc:mysql://localhost:3306/MaramDrira?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration - SIMPLE VERSION (remove all dialect lines)
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true

# Server
server.port=8089
server.servlet.context-path=/ExamenTV

